openapi: 3.1.0
info:
  title: vouch — read-only observation API
  version: "1.0.0"
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  summary: The read-only HTTP connection point of the vouch world (Layer 5 Observation).
  description: |
    External clients **connect here to watch** the deterministic vouch world: its
    state, regions, agents, the event log, and derived metrics. This surface is
    **GET-only by construction** — the server is handed only a read-only `WorldView`
    (no `emit` / `run` / `advanceTick`), so "watching cannot write" is enforced by the
    type system, not by discipline (§2-6, §2-9).

    Generated from the real implementation: `vouch-world/src/observation/server.ts` +
    `metrics.ts`, with response schemas derived from the real TypeScript types
    (`RegionState`, `AgentState`, `AlmaEvent`, `Metrics`, `Certificate`).

    Notes for clients:
      - **No write surface exists here.** Writing goes through `vouch-node` — the
        authenticated participate node (`POST /v1/register`, `POST /v1/command`), which
        mounts this same read-only observation app for its GETs.
      - **No CORS headers are set** by the server today. A browser app on another origin
        must use a dev proxy (or have CORS configured at deploy time).
      - The reference example (`examples/observe.ts`) runs a finite 8-tick simulation and
        then serves a **static** world, so `tick` does not advance while the server is up.
servers:
  - url: http://localhost:8787
    description: Default observation server (Bun.serve, port 8787).

tags:
  - name: meta
    description: Service liveness and the simulation clock.
  - name: metrics
    description: Derived, read-only lenses over the world.
  - name: state
    description: Raw world state — regions, agents, and the composed world.
  - name: log
    description: The append-only event log (the single source of truth).

paths:
  /:
    get:
      tags: [meta]
      operationId: getIndex
      summary: Service banner + the list of available endpoints.
      responses:
        "200":
          description: Service identity and endpoint index.
          content:
            application/json:
              schema:
                type: object
                required: [service, endpoints]
                properties:
                  service: { type: string, const: "vouch observation" }
                  endpoints:
                    type: array
                    items: { type: string }
              example:
                service: vouch observation
                endpoints:
                  ["/health", "/tick", "/metrics", "/state", "/regions",
                   "/regions/:id", "/agents", "/agents/:id", "/log?since=N", "/log/digest"]

  /health:
    get:
      tags: [meta]
      operationId: getHealth
      summary: Liveness probe + current sim tick.
      responses:
        "200":
          description: The server is up; reports the current tick.
          content:
            application/json:
              schema:
                type: object
                required: [ok, tick]
                properties:
                  ok: { type: boolean, const: true }
                  tick: { $ref: "#/components/schemas/Tick" }
              example: { ok: true, tick: 8 }

  /tick:
    get:
      tags: [meta]
      operationId: getTick
      summary: The current discrete simulation tick.
      responses:
        "200":
          description: Current tick.
          content:
            application/json:
              schema:
                type: object
                required: [tick]
                properties:
                  tick: { $ref: "#/components/schemas/Tick" }
              example: { tick: 8 }

  /metrics:
    get:
      tags: [metrics]
      operationId: getMetrics
      summary: Derived observation metrics (economy, trust, diplomacy, log).
      responses:
        "200":
          description: A snapshot of derived metrics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metrics" }
              example:
                tick: 8
                regions: { total: 1, recognized: 1, unrecognized: 0, active: 1, dormant: 0 }
                agents:
                  total: 4
                  residents: 3
                  treasuries: 1
                  totalCurrency: 300
                  totalCredit: 48
                  currencyGini: 0.08564814814814814
                  avgReputation: 1.5
                perRegion:
                  - id: umi
                    status: recognized
                    lifecycle: active
                    residents: 3
                    treasury: 60
                    currencyGini: 0.08564814814814814
                mobility: { migrations: 0, secessions: 0, ownershipTransfers: 0 }
                trust: { vouches: 2 }
                log:
                  length: 61
                  digest: "91a22c60"
                  eventTypes:
                    region.founded: 1
                    agent.admitted: 4
                    system.tick: 8
                    agent.decided: 24
                    economy.settled: 24

  /state:
    get:
      tags: [state]
      operationId: getState
      summary: The entire composed world state (all regions + all agents).
      responses:
        "200":
          description: The full world state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorldState" }

  /regions:
    get:
      tags: [state]
      operationId: listRegions
      summary: All regions (villages).
      responses:
        "200":
          description: Every region in the world.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RegionState" }

  /regions/{id}:
    get:
      tags: [state]
      operationId: getRegion
      summary: A single region by id.
      parameters:
        - name: id
          in: path
          required: true
          description: The region id (the `region` string, e.g. "umi").
          schema: { type: string }
      responses:
        "200":
          description: The region.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegionState" }
        "404":
          description: No region with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "region not found" }

  /agents:
    get:
      tags: [state]
      operationId: listAgents
      summary: All agents (residents + treasuries).
      responses:
        "200":
          description: Every agent in the world.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentState" }

  /agents/{id}:
    get:
      tags: [state]
      operationId: getAgent
      summary: A single agent by id.
      parameters:
        - name: id
          in: path
          required: true
          description: The agent id (`name@region`, e.g. "ada@umi").
          schema: { type: string }
      responses:
        "200":
          description: The agent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentState" }
        "404":
          description: No agent with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "agent not found" }

  /log:
    get:
      tags: [log]
      operationId: getLog
      summary: Events from the append-only log, optionally since a seq.
      parameters:
        - name: since
          in: query
          required: false
          description: Return events with `seq >= since`. Defaults to 0 (the whole log).
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: The events at or after `since`, in seq order.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AlmaEvent" }

  /log/digest:
    get:
      tags: [log]
      operationId: getLogDigest
      summary: A stable digest of the whole log + its length.
      description: |
        The digest is a deterministic hash of the event log. Two runs with the same seed
        produce the same digest — this is the determinism/replay guarantee in observable form.
      responses:
        "200":
          description: The log digest and length.
          content:
            application/json:
              schema:
                type: object
                required: [digest, length]
                properties:
                  digest: { type: string, examples: ["91a22c60"] }
                  length: { type: integer, minimum: 0 }
              example: { digest: "91a22c60", length: 61 }

components:
  schemas:
    Tick:
      type: integer
      minimum: 0
      description: Discrete sim-engine time. The protocol orders by log `seq`, not `tick` (audit G5).

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    # --- derived metrics (Layer 5) ------------------------------------------
    Metrics:
      type: object
      required: [tick, regions, agents, perRegion, mobility, trust, log]
      properties:
        tick: { $ref: "#/components/schemas/Tick" }
        regions:
          type: object
          required: [total, recognized, unrecognized, active, dormant]
          properties:
            total: { type: integer, minimum: 0 }
            recognized: { type: integer, minimum: 0 }
            unrecognized: { type: integer, minimum: 0 }
            active: { type: integer, minimum: 0 }
            dormant: { type: integer, minimum: 0 }
        agents:
          type: object
          required: [total, residents, treasuries, totalCurrency, totalCredit, currencyGini, avgReputation]
          properties:
            total: { type: integer, minimum: 0 }
            residents: { type: integer, minimum: 0 }
            treasuries: { type: integer, minimum: 0 }
            totalCurrency: { type: number }
            totalCredit: { type: number }
            currencyGini:
              type: number
              description: Gini coefficient of resident currency (0 = equal, ~1 = concentrated).
            avgReputation:
              type: number
              description: Mean economy-derived reputation across residents (0 if none).
        perRegion:
          type: array
          description: Per-region dependent variables (RFC 0002).
          items: { $ref: "#/components/schemas/RegionMetrics" }
        mobility:
          type: object
          required: [migrations, secessions, ownershipTransfers]
          description: Exit/mobility signals — SYSTEM-authored events only (forged events excluded).
          properties:
            migrations: { type: integer, minimum: 0 }
            secessions: { type: integer, minimum: 0 }
            ownershipTransfers: { type: integer, minimum: 0 }
        trust:
          type: object
          required: [vouches]
          description: Trust activity — SYSTEM-authored events only.
          properties:
            vouches: { type: integer, minimum: 0 }
        log:
          type: object
          required: [length, digest, eventTypes]
          properties:
            length: { type: integer, minimum: 0 }
            digest: { type: string }
            eventTypes:
              type: object
              description: Raw count of events by `type` (forged events included).
              additionalProperties: { type: integer, minimum: 0 }

    RegionMetrics:
      type: object
      required: [id, status, lifecycle, residents, treasury, currencyGini]
      properties:
        id: { type: string }
        status: { $ref: "#/components/schemas/RecognitionStatus" }
        lifecycle: { $ref: "#/components/schemas/RegionLifecycle" }
        residents: { type: integer, minimum: 0 }
        treasury: { type: number }
        currencyGini: { type: number }

    # --- enums (mirror the real TS unions) ----------------------------------
    AgentRole:
      type: string
      enum: [artisan, merchant, broker, treasury]
    ValueProfile:
      type: string
      enum: [strict, lenient]
    RecognitionStatus:
      type: string
      enum: [unrecognized, recognized]
    ForeignCertStance:
      type: string
      description: How a village translates another village's certificates (§4-A).
      enum: [absorb, map, reexamine, reject]

    # --- region (Layer 2) ---------------------------------------------------
    SchemaLedgerEntry:
      type: object
      required: [schemaId]
      properties:
        schemaId: { type: string }
        label: { type: string }
    VerificationPolicy:
      type: object
      required: [acceptedSchemaIds, rejectUnknownSchemas]
      properties:
        acceptedSchemaIds:
          type: array
          items: { type: string }
        rejectUnknownSchemas: { type: boolean }
    DiplomacyPolicy:
      type: object
      required: [defaultStance, overrides]
      properties:
        defaultStance: { $ref: "#/components/schemas/ForeignCertStance" }
        overrides:
          type: object
          additionalProperties: { $ref: "#/components/schemas/ForeignCertStance" }
    Governance:
      description: Who may amend a region — its constitution (§8). dictatorship → the owner; council → listed members + a vote threshold.
      oneOf:
        - type: object
          required: [kind]
          properties: { kind: { type: string, const: dictatorship } }
        - type: object
          required: [kind, members, threshold]
          properties:
            kind: { type: string, const: council }
            members: { type: array, items: { type: string } }
            threshold: { type: integer, minimum: 1 }
    EconomyPolicy:
      type: object
      description: The region's own fee/credit schedule (read by executeTransfer for the sender's region).
      required: [baseCostRate, minCostRate, repDiscount, creditPerTx]
      properties:
        baseCostRate: { type: number, minimum: 0, maximum: 1 }
        minCostRate: { type: number, minimum: 0, maximum: 1 }
        repDiscount: { type: number, minimum: 0 }
        creditPerTx: { type: integer, minimum: 0 }
    ResourcePolicy:
      type: object
      description: A region's finite resource pool config (P3 scarcity, the "compete" substrate).
      required: [capacity, regenPerTick]
      properties:
        capacity: { type: integer, minimum: 0 }
        regenPerTick: { type: integer, minimum: 0 }
    RegionLifecycle:
      type: string
      description: active = running; dormant = hibernated by the owner (can be listed + sold). A region is never deleted.
      enum: [active, dormant]
    InstitutionChange:
      description: A logged amendment to one institution policy, tagged by `policy`.
      oneOf:
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: verification }, value: { $ref: "#/components/schemas/VerificationPolicy" } } }
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: diplomacy }, value: { $ref: "#/components/schemas/DiplomacyPolicy" } } }
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: schemaLedger }, value: { type: array, items: { $ref: "#/components/schemas/SchemaLedgerEntry" } } } }
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: governance }, value: { $ref: "#/components/schemas/Governance" } } }
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: economy }, value: { $ref: "#/components/schemas/EconomyPolicy" } } }
        - { type: object, required: [policy, value], properties: { policy: { type: string, const: resource }, value: { $ref: "#/components/schemas/ResourcePolicy" } } }
    GovProposal:
      type: object
      description: A council's one in-flight amendment vote (P3); applies once `votes` reach the threshold.
      required: [change, votes, proposedBy]
      properties:
        change: { $ref: "#/components/schemas/InstitutionChange" }
        votes: { type: array, items: { type: string } }
        proposedBy: { type: string }
    Institutions:
      type: object
      required: [schemaLedger, verificationPolicy, diplomacyPolicy, governance, economyPolicy, resourcePolicy]
      properties:
        schemaLedger:
          type: array
          items: { $ref: "#/components/schemas/SchemaLedgerEntry" }
        verificationPolicy: { $ref: "#/components/schemas/VerificationPolicy" }
        diplomacyPolicy: { $ref: "#/components/schemas/DiplomacyPolicy" }
        governance: { $ref: "#/components/schemas/Governance" }
        economyPolicy: { $ref: "#/components/schemas/EconomyPolicy" }
        resourcePolicy: { $ref: "#/components/schemas/ResourcePolicy" }
    Proposer:
      description: Who proposed a region's founding.
      oneOf:
        - type: object
          required: [kind]
          properties:
            kind: { type: string, const: genesis }
        - type: object
          required: [kind]
          properties:
            kind: { type: string, const: experimenter }
            note: { type: string }
        - type: object
          required: [kind, sourceRegion, reason, cohort]
          properties:
            kind: { type: string, const: emergence }
            sourceRegion: { type: string }
            reason: { type: string }
            cohort:
              type: array
              items: { type: string }
    RegionState:
      type: object
      required: [id, displayName, institutions, status, proposer, foundedAtSeq, owner, lifecycle, salePrice, openProposal, resourceLevel]
      properties:
        id: { type: string }
        displayName: { type: string }
        institutions: { $ref: "#/components/schemas/Institutions" }
        status: { $ref: "#/components/schemas/RecognitionStatus" }
        proposer: { $ref: "#/components/schemas/Proposer" }
        foundedAtSeq:
          type: integer
          minimum: 0
          description: The log seq at which the region was founded (NOT the sim tick).
        owner:
          type: [string, "null"]
          description: The account/ID that governs this region; null = system/unowned (genesis, emergence).
        lifecycle: { $ref: "#/components/schemas/RegionLifecycle" }
        salePrice:
          type: [integer, "null"]
          description: Asking price when listed on the market; null = not for sale.
        openProposal:
          description: The council's one in-flight amendment vote (P3); null when none.
          oneOf:
            - { $ref: "#/components/schemas/GovProposal" }
            - { type: "null" }
        resourceLevel:
          type: integer
          minimum: 0
          description: Current amount in the region's resource pool (P3 scarcity); born 0.
      example:
        id: umi
        displayName: Umi
        institutions:
          schemaLedger: []
          verificationPolicy: { acceptedSchemaIds: [], rejectUnknownSchemas: false }
          diplomacyPolicy: { defaultStance: reexamine, overrides: {} }
          governance: { kind: dictatorship }
          economyPolicy: { baseCostRate: 0.2, minCostRate: 0.05, repDiscount: 0.02, creditPerTx: 1 }
          resourcePolicy: { capacity: 0, regenPerTick: 0 }
        status: recognized
        proposer: { kind: genesis }
        foundedAtSeq: 0
        owner: null
        lifecycle: active
        salePrice: null
        openProposal: null
        resourceLevel: 0

    # --- agent (Layer 3) ----------------------------------------------------
    Balances:
      type: object
      required: [credit, currency]
      properties:
        credit:
          type: number
          description: Non-transferable, slow trust accrual (§3-B).
        currency:
          type: number
          description: Transferable medium of exchange (§3-B).
    AgentState:
      type: object
      required: [id, region, role, publicKey, balances, reputation, trust, resources, valueProfile]
      properties:
        id:
          type: string
          description: name@region — stable identity across migration.
        region:
          type: string
          description: Current residence (changes on migration).
        role: { $ref: "#/components/schemas/AgentRole" }
        publicKey:
          type: string
          description: base64 Ed25519 public key ("" for a treasury account).
        balances: { $ref: "#/components/schemas/Balances" }
        reputation:
          type: number
          description: Economy-derived standing (accrues on settled trades).
        trust:
          type: number
          description: Social capital from being vouched for — distinct from reputation (a vouch doesn't buy a cheaper fee).
        resources:
          type: number
          description: Amount drawn from region resource pools (P3 scarcity).
        valueProfile: { $ref: "#/components/schemas/ValueProfile" }

    ItemState:
      type: object
      description: A unique, tradeable digital item (the ownership ledger), distinct from currency.
      required: [id, kind, owner]
      properties:
        id: { type: string }
        kind: { type: string }
        owner: { type: string, description: the agent (name@region) that holds it }

    # --- composed world (Layer 4) -------------------------------------------
    WorldState:
      type: object
      required: [regions, agents, items]
      properties:
        regions:
          type: object
          description: Regions keyed by id.
          additionalProperties: { $ref: "#/components/schemas/RegionState" }
        agents:
          type: object
          description: Agents keyed by id.
          additionalProperties: { $ref: "#/components/schemas/AgentState" }
        items:
          type: object
          description: Digital items keyed by id (the P3 ownership ledger).
          additionalProperties: { $ref: "#/components/schemas/ItemState" }

    # --- event log (Foundation B) -------------------------------------------
    AlmaEvent:
      type: object
      required: [seq, tick, type, actor, payload]
      properties:
        seq:
          type: integer
          minimum: 0
          description: Global, 0-based, monotonic position in the log (the canonical order).
        tick: { $ref: "#/components/schemas/Tick" }
        type:
          type: string
          description: |
            Event kind. Known kinds: region.founded, region.institution.changed,
            region.recognized, region.lifecycle.changed, region.listed,
            region.ownership.transferred, gov.proposal.opened, gov.vote.cast,
            resource.regenerated, resource.drawn, agent.admitted, agent.migrated,
            agent.decided, agent.vouched, economy.settled, economy.minted,
            item.minted, item.transferred, system.tick.
        actor:
          type: string
          description: The originating subject (an identifier), or "world" for the engine.
        payload:
          description: |
            Event content, opaque to the log itself; meaning belongs to higher layers.
            The richest payload is `economy.settled`, which carries a `receipt` Certificate
            and the signed balance deltas (see SettlementPayload). Other event kinds carry
            their own shapes, so a generic object is the fallback branch.
          oneOf:
            - $ref: "#/components/schemas/SettlementPayload"
            - type: object
              additionalProperties: true
      example:
        seq: 2
        tick: 0
        type: region.founded
        actor: world
        payload:
          status: recognized
          proposer: { kind: genesis }

    # --- settlement payload (the economy.settled event content) -------------
    SettlementEntry:
      type: object
      required: [agentId, currencyDelta, creditDelta, reputationDelta]
      properties:
        agentId: { type: string }
        currencyDelta: { type: number }
        creditDelta: { type: number }
        reputationDelta: { type: number }
    SettlementPayload:
      type: object
      description: The payload of an `economy.settled` event, authored by the environment.
      required: [entries, receipt, memo]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/SettlementEntry" }
        receipt: { $ref: "#/components/schemas/Certificate" }
        memo:
          type: object
          required: [from, to, amount, fee]
          properties:
            from: { type: string }
            to: { type: string }
            amount: { type: integer }
            fee: { type: integer }

    # --- certificate (Layer 1 vouch-core envelope; appears inside payloads) --
    Certificate:
      type: object
      description: |
        The universal vouch-core certificate envelope. Not returned as a top-level body by
        any read route, but embedded in `economy.settled` event payloads as the transaction
        receipt (schemaId "alma.tx/receipt/v1").
      required: [version, suite, issuer, subject, schemaId, claims, issuedAt, signature]
      properties:
        version: { type: string, const: "alma-cert/v1" }
        suite: { type: string, examples: ["ed25519"] }
        issuer: { type: string, description: name@region }
        subject: { type: string, description: name@region }
        schemaId: { type: string }
        claims:
          type: object
          additionalProperties: true
        issuedAt: { type: string, description: "ISO 8601 (deterministic, derived from tick)" }
        signature: { type: string, description: base64 }
