name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      # Root tooling package holds Biome (lint + format). `biome ci` is
      # non-mutating: it fails if anything is unformatted or trips a lint rule.
      - name: Install tooling
        run: bun install --frozen-lockfile
      - name: Biome — lint + format check
        run: bun run ci

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      # Install in dependency order: vouch-world typechecks into vouch-core's
      # source, and vouch-node typechecks into both — so deps must be present first.
      - name: Install vouch-core
        run: bun install --frozen-lockfile
        working-directory: vouch-core
      - name: Install vouch-world
        run: bun install --frozen-lockfile
        working-directory: vouch-world
      - name: Install vouch-node
        run: bun install --frozen-lockfile
        working-directory: vouch-node
      - name: Install vouch-mcp
        run: bun install --frozen-lockfile
        working-directory: vouch-mcp
      - name: Install vouch-cli
        run: bun install --frozen-lockfile
        working-directory: vouch-cli

      - name: vouch-core — typecheck + test
        run: bun run typecheck && bun test
        working-directory: vouch-core
      - name: vouch-world — typecheck + test
        run: bun run typecheck && bun test
        working-directory: vouch-world
      - name: vouch-node — typecheck + test
        run: bun run typecheck && bun test
        working-directory: vouch-node
      - name: vouch-mcp — typecheck + test
        run: bun run typecheck && bun test
        working-directory: vouch-mcp
      - name: vouch-cli — typecheck + test
        run: bun run typecheck && bun test
        working-directory: vouch-cli
