# ALMA / vouch — capability catalog
# =============================================================================
# The single source of truth for:
#   - the flagship SKILL.md  (skills/SKILL.md, task C1)
#   - the speculative write OpenAPI  (openapi/write.draft.yaml, task C10)
#
# GENERATED BY READING the real exported signatures of vouch-world's `environment`
# and `credential` layers. It records the LOGICAL inputs a caller supplies — the
# server-side arguments (the narrow CommitSink `env`, the region notary KeyPair, the
# sim `tick`) are environment concerns and are listed separately under `serverArgs`
# so the trust boundary is explicit. A client never supplies them.
#
# -----------------------------------------------------------------------------
# STATUS (read before using):
#   Every WRITE capability below is an IN-PROCESS function on this branch. There is
#   NO write HTTP API yet — no `/v1`, no command envelope, no found/amend/admit/
#   transact/migrate routes. HTTP exposure is Track B's contract; until it is frozen
#   these entries carry `httpStatus: not-yet-http` and must be documented as logical
#   contracts, never as live endpoints. (Track C P1 decision, 2026-06-26.)
#
#   The only live HTTP surface is the read-only observation server (10 GET routes,
#   documented in openapi/read.yaml, task C2).
# =============================================================================

meta:
  source:
    package: vouch-world
    branch: add-vouch-simulator
    commit: eb2d2c1
    modules:
      - src/environment/index.ts   # founding, economy, diplomacy, population (write path)
      - src/credential/index.ts    # typed credentials (issue/verify + standard library)
  invariants:
    - "emit-only state: writes only take effect by an emitted event folded through the reducer"
    - "determinism/replay: no wall-clock; order by log seq; randomness via the environment RNG"
    - "write path is environment-owned: domain ops take the narrow CommitSink {getState, emit}"
  keyCustody: >
    Signing keys are NEVER supplied by an external client. `executeTransfer` requires the
    region notary KeyPair server-side; `issueCredential` / `issueCertificate` take a raw
    Uint8Array private key in-process. Key generation, storage, and custody are SERVER
    concerns — a Skill or HTTP client must never transmit a private key.

# --- shared vocabulary (enums referenced by logicalInput shapes) --------------
enums:
  AgentRole: [artisan, merchant, broker, treasury]
  ValueProfile: [strict, lenient]
  RecognitionStatus: [unrecognized, recognized]
  ForeignCertStance: [absorb, map, reexamine, reject]   # §4-A foreign-cert translation
  ProposerKind: [genesis, experimenter, emergence]
  InstitutionChangePolicy: [verification, diplomacy, schemaLedger]

# --- reusable logical shapes (mirror the real TS types) -----------------------
shapes:
  RegionDefinition:
    id: string            # the `region` string, lowercase alphanumeric, e.g. "umi"
    displayName: string
    institutions: Institutions
  Institutions:
    schemaLedger: "SchemaLedgerEntry[]"        # [{ schemaId, label? }]
    verificationPolicy: { acceptedSchemaIds: "string[]", rejectUnknownSchemas: boolean }
    diplomacyPolicy: { defaultStance: ForeignCertStance, overrides: "Record<region, ForeignCertStance>" }
  Proposer:
    # one of:
    - { kind: genesis }
    - { kind: experimenter, note: "string?" }
    - { kind: emergence, sourceRegion: string, reason: string, cohort: "string[]" }
  FoundingProposal: { definition: RegionDefinition, proposer: Proposer }
  InstitutionChange:
    # one of (tagged by `policy`):
    - { policy: verification, value: VerificationPolicy }
    - { policy: diplomacy, value: DiplomacyPolicy }
    - { policy: schemaLedger, value: "SchemaLedgerEntry[]" }
  AdmitSpec:
    id: string            # name@region; must end with "@<region>"
    region: string
    role: AgentRole
    valueProfile: ValueProfile
    publicKey: string     # base64 Ed25519 public key ("" for treasury)
    currency: "number?"   # default 0
    credit: "number?"     # default 0
  TransferMove: { from: string, to: string, amount: integer }   # currency, positive integer
  Certificate:           # the universal vouch-core envelope (also the economy receipt)
    version: string       # "alma-cert/v1"
    suite: string         # "ed25519"
    issuer: string        # name@region
    subject: string       # name@region
    schemaId: string
    claims: object
    issuedAt: string      # ISO 8601
    signature: string     # base64

# =============================================================================
# WRITE capabilities — environment-owned. In-process today; not-yet-HTTP.
# =============================================================================
capabilities:

  founding:
    module: src/environment/founding.ts
    items:
      - name: seedGenesis
        summary: Seed genesis villages (born `recognized`) through the founding engine.
        logicalInput: { definitions: "RegionDefinition[]" }
        serverArgs: [env]                 # CommitSink<WorldState>
        returns: "RegionState[]"
        emits: region.founded             # one per definition, status=recognized
        httpStatus: not-yet-http
        notes: "Genesis villages ARE the established society, so they are born recognized."

      - name: proposeFounding
        summary: Found a village (born `unrecognized` unless the proposer is genesis).
        logicalInput: { proposal: FoundingProposal }
        serverArgs: [env]
        returns: RegionState
        emits: region.founded
        errors: ["invalid region id (must be lowercase alphanumeric)", "region already exists"]
        httpStatus: not-yet-http
        constructors:                     # both flow into the SAME engine (propose/execute split)
          - experimenterProposal(definition, note?)   # (a) external injection — god view, sim-only
          - emergenceProposal(definition, sourceRegion, reason, cohort)  # (b) internal emergence — interface only

      - name: amendInstitution
        summary: Replace one of a region's institution policies (legislator plumbing, §8).
        logicalInput: { regionId: string, change: InstitutionChange, proposer: Proposer }
        serverArgs: [env]
        returns: RegionState
        emits: region.institution.changed
        errors: ["region does not exist"]
        httpStatus: not-yet-http
        notes: >
          The mechanism exists and every change is logged; nothing auto-calls it. Provenance
          gating (only collective-origin proposers may amend) is deferred to the reducer fold
          point (audit G8) and is NOT enforced on this branch.

  economy:
    module: src/environment/economy.ts
    items:
      - name: executeTransfer
        summary: The SOLE producer of value events — move currency, accrue credit, mint a signed receipt.
        logicalInput: { move: TransferMove }
        serverArgs: [env, tick, notary]   # tick = sim time (deterministic); notary = region KeyPair (server-held)
        returns:
          ok_true:  { ok: true, fee: integer, receipt: Certificate }   # receipt.schemaId = "alma.tx/receipt/v1"
          ok_false: { ok: false, reason: TransferFailureReason }
        emits: economy.settled            # exactly one, env-authored, SYSTEM_ACTOR
        httpStatus: not-yet-http
        keyCustody: "Requires the region notary KeyPair server-side. A client must never send it."
        TransferFailureReason:
          # stable failure set — reused by the speculative write OpenAPI (C10)
          - unknown-agent
          - self-transfer
          - not-transferable               # only `currency` is transferable on this branch (§3-B)
          - bad-amount                     # amount must be a positive integer
          - insufficient-funds
          - no-treasury                    # the region fee sink must exist (conservation)
          # cross-region (from.region != to.region) diplomacy gate (§4-C):
          - unknown-region
          - sender-region-unrecognized
          - receiver-region-unrecognized
          - receiver-rejects-sender
        receiptClaims:                     # claims carried by the alma.tx/receipt/v1 certificate
          { from: string, to: string, amount: integer, fee: integer, kind: "currency" }

  diplomacy:
    module: src/environment/diplomacy.ts
    items:
      - name: recognizeRegion
        summary: An already-recognized region admits a founded (unrecognized) one to the international society (§4-C).
        logicalInput: { by: string, target: string }
        serverArgs: [env]
        returns: RegionState
        emits: region.recognized
        errors:
          - "recognizer does not exist"
          - "recognizer is itself unrecognized"   # an unrecognized region cannot recognize
          - "target does not exist"
        idempotent: true                  # recognizing an already-recognized target is a no-op
        httpStatus: not-yet-http
    # read/derive helpers (NOT writes; no emit) — useful for a future read endpoint, listed for completeness:
    readHelpers:
      - stanceToward(viewer, issuerRegion) -> ForeignCertStance
      - assessCertificate(state, viewerRegionId, cert) -> CertAssessment   # FORM (core) then MEANING (policy)
      - canTransactAcross(state, fromRegion, toRegion) -> { ok, reason }    # the cross-region gate predicate

  population:
    module: src/environment/population.ts
    items:
      - name: admitAgent
        summary: Admit a resident agent to a region.
        logicalInput: { spec: AdmitSpec }
        serverArgs: [env]
        returns: AgentState
        emits: agent.admitted
        errors: ["invalid agent id", "agent id must be born in its region", "region does not exist", "agent already exists"]
        httpStatus: not-yet-http

      - name: admitTreasury
        summary: Admit the per-region treasury account (collects trust-cost fees so currency is conserved).
        logicalInput: { region: string, initialCurrency: "number?" }   # default 0
        serverArgs: [env]
        returns: AgentState
        emits: agent.admitted             # role=treasury, valueProfile=lenient, publicKey=""
        httpStatus: not-yet-http

      - name: immigrate
        summary: Move an agent to another region (§3-C). Founded (unrecognized) regions are valid targets.
        logicalInput: { agentId: string, toRegion: string }
        serverArgs: [env]
        returns: AgentState
        emits: agent.migrated
        errors: ["agent does not exist", "region does not exist"]
        httpStatus: not-yet-http

  credential:
    module: src/credential/index.ts
    items:
      - name: issueCredential
        summary: Validate typed claims against a credential type's schema, then issue + sign the envelope.
        logicalInput:
          type: string                    # a CredentialType (its schemaId) from the library or a custom one
          input: { issuer: string, subject: string, claims: object, issuedAt: string, suite: "string?" }
        serverArgs: [issuerPrivateKey]     # raw Uint8Array — SERVER-HELD, never from a client
        returns: Certificate
        throws: "on bad claims (zod schema parse) — structured validation"
        httpStatus: not-yet-http
        keyCustody: "Takes a raw private key in-process. Key custody is a server concern."
      - name: verifyCredential
        summary: Verify FORM (core signature/shape) then MEANING (claims match the declared type).
        logicalInput: { cert: Certificate, type: string }
        serverArgs: [issuerPublicKey]      # public key — safe to pass
        returns: "CredentialResult<T> = { ok:true, schemaId, claims } | { ok:false, reason, detail }"
        readOnly: true
      - name: verifyCredentialWith
        summary: Verify against whichever type a registry holds for the cert's schemaId.
        logicalInput: { cert: Certificate, registry: string }
        serverArgs: [issuerPublicKey]
        returns: "CredentialResult<Record<string, unknown>>"
        readOnly: true

# --- standard credential library (the "digital items" for SKILL.md part 3) -----
standardCredentials:
  - schemaId: alma.skill/v1
    label: skill
    claims: { skill: "string (min 1)", level: "integer 0..10" }
    summary: A skill attestation — the holder can do X at level N.
  - schemaId: alma.membership/v1
    label: membership
    claims: { org: "string (min 1)", role: "string (min 1)", since: "string (min 1)" }
    summary: Membership of an organization in a role, since a date.
  - schemaId: alma.asset/v1
    label: asset
    claims: { kind: "string (min 1)", amount: "number >= 0", unit: "string (min 1)" }
    summary: A claim over some amount of an asset (a deed, a license quota).
  - schemaId: alma.endorsement/v1
    label: endorsement
    claims: { of: "identifier (name@region)", weight: "integer 1..5", note: "string?" }
    summary: One party endorsing another, with a weight and optional note.
  - schemaId: alma.tx/receipt/v1
    label: economy-receipt
    claims: { from: "identifier", to: "identifier", amount: integer, fee: integer, kind: "currency" }
    summary: The byproduct receipt minted by executeTransfer, signed by the region notary.
    issuedBy: server   # not directly issuable by a client; produced as a transfer byproduct
